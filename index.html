<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green House</title>
    <link rel="stylesheet" href="./style.css" />
    <!-- Tailwind and Daisy UI CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- tailwind cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="w-11/12 mx-auto">
    <header>
      <div class="navbar bg-base-100 shadow-sm">
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li>
                <a href="" class=""
                  ><i class="fa-solid fa-circle-question"></i>FAQ</a
                >
              </li>
              <li>
                <a href="" class=""
                  ><i class="fa-solid fa-store"></i>About Us</a
                >
              </li>
              <li>
                <a href="" class=""
                  ><i class="fa-solid fa-right-from-bracket"></i>Logout</a
                >
              </li>
            </ul>
          </div>
          <!-- logo -->
          <a href="" class="flex items-center gap-1">
            <span class="text-lg font-bold">Green</span>
            <i class="fa-brands fa-pagelines text-green-500"></i>
            <span class="text-lg font-bengali font-semibold">House</span>
          </a>
        </div>
        <div class="navbar-end hidden lg:flex">
          <ul class="menu menu-horizontal px-1 space-x-4">
            <li>
              <a href="" class="btn btn-soft btn-ghost"
                ><i class="fa-solid fa-circle-question"></i>FAQ</a
              >
            </li>
            <li>
              <a href="" class="btn btn-soft btn-ghost"
                ><i class="fa-solid fa-store"></i>About Us</a
              >
            </li>
            <li>
              <a href="" class="btn btn-soft btn-ghost"
                ><i class="fa-solid fa-right-from-bracket"></i>Logout</a
              >
            </li>
          </ul>
        </div>
      </div>
    </header>
    <section class="my-5">
      <div class="grid grid-cols-12 justify-between">
        <div id="allBtn" class="col-span-2 font-bold">Categories</div>
        <div class="col-span-8">
          Your Happiness
          <div id="cardContainer" class="grid grid-cols-1 my-5 space-y-2 md:grid-cols-3 gap-3">
           
          </div>
        </div>
        <div id="calculation" class="col-span-2">Cart</div>
      </div>
    </section>

    <!-- script -->
    <script src="./script/script.js"></script>
  </body>
</html>
